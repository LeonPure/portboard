name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked
      - name: Verify tag matches package version
        run: |
          package_version="$(uv run python -c 'from portboard import __version__; print(__version__)')"
          test "v${package_version}" = "${GITHUB_REF_NAME}"
      - name: Verify release commit belongs to main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      - run: uv build --no-sources
      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  standalone:
    name: Build standalone (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: darwin-arm64
            executable: portboard
          - runner: macos-15-intel
            target: darwin-x64
            executable: portboard
          - runner: ubuntu-22.04-arm
            target: linux-arm64
            executable: portboard
          - runner: ubuntu-22.04
            target: linux-x64
            executable: portboard
          - runner: windows-2022
            target: win32-x64
            executable: portboard.exe
          - runner: windows-11-arm
            target: win32-arm64
            executable: portboard.exe
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --locked
      - name: Build standalone executable
        run: uv run pyinstaller --clean --noconfirm packaging/pyinstaller/portboard.spec
      - name: Name and verify executable
        shell: bash
        run: |
          suffix=""
          if [[ "${{ matrix.executable }}" == *.exe ]]; then
            suffix=".exe"
          fi
          artifact="dist/portboard-${{ matrix.target }}${suffix}"
          mv "dist/${{ matrix.executable }}" "${artifact}"
          "${artifact}" --version
      - uses: actions/upload-artifact@v4
        with:
          name: standalone-${{ matrix.target }}
          path: dist/portboard-${{ matrix.target }}*
          if-no-files-found: error

  package-npm:
    name: Build npm packages
    needs: [build, standalone]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: actions/download-artifact@v4
        with:
          pattern: standalone-*
          path: dist/standalone
          merge-multiple: true
      - name: Assemble platform packages
        run: |
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            package="packaging/npm/platforms/${target}"
            mkdir -p "${package}/bin"
            install -m 755 "dist/standalone/portboard-${target}" "${package}/bin/portboard"
            cp packaging/npm/platforms/README.md "${package}/README.md"
            cp LICENSE "${package}/LICENSE"
          done
          for target in win32-arm64 win32-x64; do
            package="packaging/npm/platforms/${target}"
            mkdir -p "${package}/bin"
            install -m 755 "dist/standalone/portboard-${target}.exe" "${package}/bin/portboard.exe"
            cp packaging/npm/platforms/README.md "${package}/README.md"
            cp LICENSE "${package}/LICENSE"
          done
          cp LICENSE packaging/npm/portboard/LICENSE
      - name: Test npm launcher
        run: npm test --prefix packaging/npm/portboard
      - name: Verify npm launcher end to end
        run: |
          package="packaging/npm/portboard/node_modules/@leonpure/portboard-linux-x64"
          mkdir -p "${package}"
          cp -R packaging/npm/platforms/linux-x64/. "${package}/"
          node packaging/npm/portboard/bin/portboard.js --version
      - name: Pack npm distributions
        run: |
          mkdir -p dist/npm
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-arm64 win32-x64; do
            npm pack "packaging/npm/platforms/${target}" --pack-destination dist/npm
          done
          npm pack packaging/npm/portboard --pack-destination dist/npm
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package-distributions
          path: dist/npm/
          if-no-files-found: error

  github-release:
    name: Publish GitHub release assets
    needs: [build, standalone]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/release
      - uses: actions/download-artifact@v4
        with:
          pattern: standalone-*
          path: dist/release
          merge-multiple: true
      - name: Package Homebrew archives
        working-directory: dist/release
        shell: bash
        run: |
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            chmod 755 "portboard-${target}"
            tar -czf "portboard-${target}.tar.gz" "portboard-${target}"
          done
          for target in win32-arm64 win32-x64; do
            zip "portboard-${target}.zip" "portboard-${target}.exe"
          done
      - name: Generate checksums
        working-directory: dist/release
        run: sha256sum * > SHA256SUMS
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=()
          if [[ "${GITHUB_REF_NAME}" =~ (a|b|rc)[0-9]+$ ]]; then
            release_flags+=(--prerelease)
          fi
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/release/* \
              --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/release/* \
              --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes "${release_flags[@]}"
          fi

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/portboard
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    name: Publish to npm
    needs: package-npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@leonpure/portboard
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use a trusted-publishing compatible npm
        run: npm install --global npm@11.18.0
      - uses: actions/download-artifact@v4
        with:
          name: npm-package-distributions
          path: dist/npm
      - name: Publish platform packages before the launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm_version="$(node -p "require('./packaging/npm/portboard/package.json').version")"
          dist_tag="latest"
          if [[ "${npm_version}" == *-* ]]; then
            dist_tag="next"
          fi

          publish_if_missing() {
            package_name="$1"
            archive="$2"
            if npm view "${package_name}@${npm_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${npm_version} is already published"
            else
              npm publish "${archive}" --access public --tag "${dist_tag}"
            fi
          }

          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64 win32-arm64 win32-x64; do
            publish_if_missing \
              "@leonpure/portboard-${target}" \
              "dist/npm/leonpure-portboard-${target}-${npm_version}.tgz"
          done
          publish_if_missing \
            "@leonpure/portboard" \
            "dist/npm/leonpure-portboard-${npm_version}.tgz"
