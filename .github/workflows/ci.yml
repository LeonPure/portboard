name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest, windows-11-arm]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      - run: uv build
      - name: Test npm launcher
        if: matrix.python-version == '3.11'
        run: npm test --prefix packaging/npm/portboard
      - name: Build and verify standalone executable
        if: matrix.python-version == '3.11'
        shell: bash
        run: |
          uv run pyinstaller --clean --noconfirm \
            --distpath build/standalone-dist \
            --workpath build/pyinstaller \
            packaging/pyinstaller/portboard.spec
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            build/standalone-dist/portboard.exe --version
          else
            build/standalone-dist/portboard --version
          fi
